<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <a class="navbar-brand" href="index.html">My Games</a>
        <div class="navbar-nav">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="tic-tac-toe.html">Tic Tac Toe</a>
            <a class="nav-link active" href="rock-paper-scissors.html">Rock Paper Scissors</a>
        </div>
    </nav>

    <main>
        <h1>Rock Paper Scissors</h1>
        <div class="choices">
            <div class="choice" id="rock">
                <img src="images/rock.png" alt="Rock">
            </div>
            <div class="choice" id="paper">
                <img src="images/paper.png" alt="Paper">
            </div>
            <div class="choice" id="scissors">
                <img src="images/scissors.png" alt="Scissors">
            </div>
        </div>
        <div class="score-board">
            <div class="scores" id="user-score-box">
                <p id="user-score">0</p>
                <h2>You</h2>
            </div>
            <div class="scores" id="computer-score-box">
                <p id="computer-score">0</p>
                <h2>Computer</h2>
            </div>
        </div>
        <div class="final-result">
            <p id="result">Play Your Move!</p>
        </div>
    </main>

    <script src="js/game2.js"></script>

</body>

</html>
